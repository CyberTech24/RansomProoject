<!DOCTYPE html>
<html>
<head>
    <title>Ransomware Detection System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            display: none;
        }
        .result-safe {
            background: #d4edda;
            border: 2px solid #28a745;
        }
        .result-danger {
            background: #f8d7da;
            border: 2px solid #dc3545;
        }
        .result-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
        .result-details {
            font-size: 14px;
            line-height: 1.8;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Ransomware Detection System</h1>
        <p class="subtitle">AI-Powered Malware Detection using Machine Learning</p>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <p id="uploadText">Click or drag file here to scan</p>
            <p style="color: #999; font-size: 12px; margin-top: 10px;">Max file size: 500MB</p>
        </div>
        
        <input type="file" id="fileInput" onchange="handleFileSelect(event)">
        
        <button class="btn" id="scanBtn" onclick="scanFile()" disabled>Scan File</button>
        
        <div class="spinner" id="spinner"></div>
        
        <div id="result"></div>
    </div>

    <script>
        let selectedFile = null;

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                document.getElementById('uploadText').textContent = '✓ ' + selectedFile.name;
                document.getElementById('scanBtn').disabled = false;
            }
        }

        async function scanFile() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            document.getElementById('scanBtn').disabled = true;
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            try {
                const response = await fetch('/scan', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                document.getElementById('spinner').style.display = 'none';

                if (data.error) {
                    alert('Error: ' + data.error);
                    document.getElementById('scanBtn').disabled = false;
                    return;
                }

                displayResult(data);
            } catch (error) {
                document.getElementById('spinner').style.display = 'none';
                alert('Error scanning file: ' + error.message);
                document.getElementById('scanBtn').disabled = false;
            }
        }

        function displayResult(data) {
            const resultDiv = document.getElementById('result');
            const isRansomware = data.is_ransomware;

            resultDiv.className = isRansomware ? 'result-danger' : 'result-safe';
            resultDiv.innerHTML = `
                <div class="result-title">${isRansomware ? '⚠️ RANSOMWARE DETECTED!' : '✅ FILE IS SAFE'}</div>
                <div class="result-details">
                    <div class="detail-row">
                        <strong>File:</strong>
                        <span>${data.filename}</span>
                    </div>
                    <div class="detail-row">
                        <strong>Prediction:</strong>
                        <span>${data.prediction}</span>
                    </div>
                    <div class="detail-row">
                        <strong>Confidence:</strong>
                        <span>${data.confidence.toFixed(2)}%</span>
                    </div>
                    <div class="detail-row">
                        <strong>Ransomware Probability:</strong>
                        <span>${data.ransomware_probability.toFixed(2)}%</span>
                    </div>
                    <div class="detail-row">
                        <strong>Benign Probability:</strong>
                        <span>${data.benign_probability.toFixed(2)}%</span>
                    </div>
                    <div class="detail-row">
                        <strong>File Entropy:</strong>
                        <span>${data.entropy.toFixed(2)}</span>
                    </div>
                    <div class="detail-row">
                        <strong>File Size:</strong>
                        <span>${(data.file_size / 1024).toFixed(2)} KB</span>
                    </div>
                </div>
            `;
            resultDiv.style.display = 'block';
            document.getElementById('scanBtn').disabled = false;
        }
    </script>
</body>
</html>
